name: Deploy Medicpadi Backend Services to AWS

on:
  workflow_run:
    workflows: ["Build and Push Docker Images for MedicPadi microservice to Docker Hub"]
    types:
      - completed

jobs:
  deploy:
    name: Deploy changed services
    if: >
      ${{
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'main'
      }}
    runs-on: ubuntu-latest

    steps:
      - name: Download built services list
        uses: actions/download-artifact@v4
        with:
          name: built-services
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Read services to deploy
        id: services
        run: |
          SERVICES=$(cat built-services.json)
          echo "services=$SERVICES" >> $GITHUB_OUTPUT
          echo "Services to deploy: $SERVICES"

      - name: Skip deploy — no services were built
        if: steps.services.outputs.services == '[]'
        run: echo "No services were built in the triggering workflow. Nothing to deploy."

      - name: Deploy to AWS VM via SSH
        if: steps.services.outputs.services != '[]'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.MEDICPADI_AWS_HOST }}
          username: ${{ secrets.MEDICPADI_AWS_USER }}
          key: ${{ secrets.MEDICPADI_AWS_KEY }}
          script: |
            # Navigate to the project directory
            cd /var/www/MedicPadi/MedicPadi-Backend || exit 1

            # Update compose file and config from git
            git pull

            # GitHub Actions injects the value directly before sending this script to SSH
            # Convert JSON array (e.g. ["auth","gateway"]) to space-separated names
            SERVICE_LIST=$(echo '${{ steps.services.outputs.services }}' | tr -d '[]"' | tr ',' ' ')
            echo "Deploying: $SERVICE_LIST"

            # Pull only the images that were freshly pushed
            echo "Pulling updated Docker images..."
            docker compose -f docker-compose.yaml pull $SERVICE_LIST

            # Restart only the changed services; --no-deps leaves their dependencies untouched
            echo "Restarting updated services..."
            docker compose -f docker-compose.yaml up -d --no-deps --remove-orphans $SERVICE_LIST

            # Remove dangling images left over from the previous builds
            echo "Cleaning up unused Docker images..."
            docker image prune -f
