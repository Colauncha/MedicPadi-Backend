name: Build and Push Docker Images for MedicPadi microservice to Docker Hub

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'

jobs:
  build-and-push:
    name: Build and Push ${{ matrix.service }}
    runs-on: ubuntu-latest

    strategy:
      max-parallel: 4
      matrix:
        service:
          - gateway
          - auth
          - profile

    steps:
      # 1. Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Setup Node.js
      - name: Setup PNPM and Node.js Action
        uses: digi-fry/setup-pnpm-node-action@v1
        with:
          node-version: 20
          pnpm-version: 10

      # # 3. Enable pnpm via Corepack (Best Practice)
      # - name: Enable Corepack
      #   run: corepack enable

      # 4. Install dependencies
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 5. Nx Build stage
      - name: Build ${{ matrix.service }} with Nx
        run: pnpm nx build ${{ matrix.service }} --configuration=development

      # 6. Extract Docker metadata
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/medicpadi-${{ matrix.service }}

      # 7. Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 8. Log in to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 9. Build and push Docker image
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NODE_ENV=development
          cache-from: type=gha
          cache-to: type=gha,mode=max
